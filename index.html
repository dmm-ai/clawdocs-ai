<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawDocs AI - AI文档工厂</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: white; border-radius: 20px; padding: 60px 40px; max-width: 600px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
  .logo { font-size: 4em; margin-bottom: 20px; }
  h1 { font-size: 2.5em; font-weight: 800; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 16px; }
  .subtitle { color: #6b7280; font-size: 1.1em; margin-bottom: 40px; line-height: 1.6; }
  .btn { display: inline-block; padding: 18px 48px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; text-decoration: none; border-radius: 50px; font-size: 1.2em; font-weight: 700; transition: all 0.3s; box-shadow: 0 8px 24px rgba(102,126,234,0.4); margin: 12px; }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(102,126,234,0.6); }
  .btn.secondary { background: white; color: #667eea; border: 2px solid #667eea; }
  .features { margin-top: 50px; text-align: left; }
  .feature { display: flex; align-items: flex-start; margin-bottom: 24px; }
  .feature-icon { font-size: 2em; margin-right: 16px; }
  .feature-text h3 { font-size: 1.1em; font-weight: 700; color: #1f2937; margin-bottom: 4px; }
  .feature-text p { color: #6b7280; font-size: 0.95em; line-height: 1.5; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">🦑</div>
    <h1>ClawDocs AI</h1>
    <p class="subtitle">AI 文档工厂 - 让文档创作变得简单高效</p>
    <a href="mvp.html" class="btn">🚀 开始使用</a>
    <a href="https://github.com/dmm-ai/clawdocs-ai" class="btn secondary">📦 GitHub</a>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">📄</div>
        <div class="feature-text">
          <h3>智能合同生成</h3>
          <p>输入需求，AI 自动生成专业商业合同</p>
        </div>
      </div>
      <div class="feature">
        <div class="feature-icon">✉️</div>
        <div class="feature-text">
          <h3>商务邮件助手</h3>
          <p>自动撰写专业商务邮件，支持多种场景</p>
        </div>
      </div>
      <div class="feature">
        <div class="feature-icon">📊</div>
        <div class="feature-text">
          <h3>工作报告撰写</h3>
          <p>快速生成工作汇报、项目总结</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
