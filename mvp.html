<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawDocs AI - AI文档工厂</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f3ff; color: #1a1a2e; min-height: 100vh; }

  .topbar { background: linear-gradient(135deg, #1a1040, #2d1b69); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.2); }
  .topbar .brand { font-size: 1.2em; font-weight: 700; color: white; cursor: pointer; }
  .topbar .brand span { color: #c4b5fd; }

  .container { max-width: 900px; margin: 0 auto; padding: 32px 20px; }

  .hero { text-align: center; margin-bottom: 36px; }
  .hero h1 { font-size: 2.4em; font-weight: 800; margin-bottom: 12px; background: linear-gradient(135deg, #7c3aed, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero p { color: #6b7280; font-size: 1.08em; }

  .doc-types { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 28px; }
  .doc-type { background: white; border: 2px solid #e5e7eb; border-radius: 16px; padding: 16px 8px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .doc-type:hover { border-color: #a78bfa; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(124,58,237,0.12); }
  .doc-type.active { border-color: #7c3aed; background: linear-gradient(135deg, #7c3aed, #6d28d9); color: white; }
  .doc-type .icon { font-size: 1.8em; margin-bottom: 6px; display: block; }

  .input-section { background: white; border-radius: 20px; padding: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); margin-bottom: 16px; }
  .input-section textarea { width: 100%; border: 2px solid #e5e7eb; border-radius: 12px; padding: 14px 16px; font-size: 1em; font-family: inherit; resize: vertical; min-height: 130px; outline: none; }

  .generate-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #7c3aed, #6d28d9); color: white; border: none; border-radius: 16px; font-size: 1.15em; font-weight: 700; cursor: pointer; margin-bottom: 12px; }
  .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,0.4); }

  .output-section { background: white; border-radius: 20px; padding: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); display: none; margin-bottom: 16px; }
  .output-section.show { display: block; }
  .output-section pre { white-space: pre-wrap; word-wrap: break-word; font-family: inherit; font-size: 0.92em; line-height: 1.9; color: #374151; max-height: 600px; overflow-y: auto; }

  .actions { display: flex; gap: 10px; margin-top: 20px; }
  .actions button { flex: 1; padding: 13px; border-radius: 12px; font-size: 0.92em; font-weight: 600; cursor: pointer; border: 2px solid #e5e7eb; background: white; color: #555; }
  .actions button:hover { border-color: #7c3aed; color: #7c3aed; }
  .actions button.primary { background: #7c3aed; color: white; border-color: #7c3aed; }

  .footer { text-align: center; padding: 40px 20px; color: #9ca3af; font-size: 0.85em; }
  .footer a { color: #7c3aed; text-decoration: none; }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand" onclick="location.reload()">🦑 Claw<span>Docs</span> AI</div>
  </div>

  <div class="container">
    <div class="hero">
      <h1>AI 文档工厂</h1>
      <p>一句话需求，自动生成合同、报告、方案、邮件</p>
    </div>

    <div class="doc-types">
      <button class="doc-type active" onclick="selectType(this, 'contract')">📄 合同起草</button>
      <button class="doc-type" onclick="selectType(this, 'email')">✉️ 邮件助手</button>
      <button class="doc-type" onclick="selectType(this, 'report')">📊 报告撰写</button>
      <button class="doc-type" onclick="selectType(this, 'proposal')">💡 方案输出</button>
      <button class="doc-type" onclick="selectType(this, 'polish')">✨ 文档润色</button>
    </div>

    <div class="input-section">
      <label>📝 描述你的需求</label>
      <textarea id="userInput" placeholder="用大白话说你要写什么，越详细生成越准确……

例如：我是做市场调研的咨询公司，帮我想一份和客户的咨询服务合同，费用5万，分三期付款，首付30%，期限6个月"></textarea>
    </div>

    <button class="generate-btn" onclick="generate()">⚡ 开始生成</button>

    <div class="output-section" id="outputSection">
      <pre id="outputContent">（生成内容将显示在这里）</pre>
      <div class="actions">
        <button onclick="copyText()">📋 复制内容</button>
        <button onclick="downloadWord()">📥 下载Word</button>
        <button class="primary" onclick="shareWechat()">💬 分享微信</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <div>🦑 ClawDocs AI · 量子文档智能有限公司</div>
    © 2026 ClawDocs AI ·
    <a href="https://admirable-mermaid-91c0a1.netlify.app" target="_blank">官网</a> ·
    服务条款 · 联系我们
  </div>

  <script>
    let selectedType = 'contract';

    function selectType(btn, type) {
      document.querySelectorAll('.doc-type').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedType = type;
    }

    async function generate() {
      const input = document.getElementById('userInput').value.trim();
      if (!input) { alert('请先输入需求描述'); return; }

      const btn = document.querySelector('.generate-btn');
      const output = document.getElementById('outputSection');
      const content = document.getElementById('outputContent');

      btn.disabled = true;
      btn.textContent = '⏳ 生成中...';
      output.classList.remove('show');

      // 模拟AI生成（实际应调用API）
      setTimeout(() => {
        content.textContent = `【${selectedType}】根据您的需求生成的文档内容...

（这里是AI生成的具体内容，基于您输入的需求：${input}）

━━━━━━━━━━━━━━━━━━━━━━━━━━
⚠️ 本文档由 ClawDocs AI 自动生成，仅供参考。
正式使用前请咨询专业法律/商业人士。`;

        output.classList.add('show');
        btn.disabled = false;
        btn.textContent = '⚡ 重新生成';
      }, 2000);
    }

    function copyText() {
      const text = document.getElementById('outputContent').textContent;
      navigator.clipboard.writeText(text).then(() => alert('已复制')).catch(() => alert('复制失败'));
    }

    function downloadWord() {
      alert('Word下载功能开发中...');
    }

    function shareWechat() {
      alert('微信分享功能开发中...');
    }
  </script>
</body>
</html>
