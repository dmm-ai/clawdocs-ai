<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="claw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="#a78bfa" stroke-width="2"/>
  <!-- 爪/章鱼符号 -->
  <!-- 主体曲线：Doc文档形状+爪的意象 -->
  <text x="100" y="130" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" 
        fill="url(#claw)" text-anchor="middle">🦑</text>
  <!-- 顶部装饰线：代表文档页 -->
  <rect x="50" y="48" width="100" height="6" rx="3" fill="#a78bfa" opacity="0.6"/>
  <rect x="55" y="58" width="70" height="3" rx="1.5" fill="#a78bfa" opacity="0.3"/>
  <!-- AI光泽 -->
  <circle cx="160" cy="50" r="18" fill="#7c3aed" opacity="0.2"/>
  <text x="160" y="55" font-family="Arial" font-size="14" fill="#a78bfa" text-anchor="middle">AI</text>
</svg>
